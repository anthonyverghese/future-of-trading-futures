services:
  ib-gateway:
    image: ghcr.io/gnzsnz/ib-gateway:stable
    # Limit container restarts to 4 attempts to prevent IBKR account lockout
    # from too many failed login attempts. After 4 failed restarts, the
    # container stays stopped until manually restarted.
    restart: on-failure:4
    env_file:
      - ib-gateway.env
    ports:
      - "127.0.0.1:4002:4004"  # Paper trading API
      - "127.0.0.1:5900:5900"  # VNC for weekly 2FA
    ulimits:
      nofile:
        soft: 10000
        hard: 10000
