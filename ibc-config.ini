# IBC Configuration — IB Gateway auto-login for paper trading
#
# Documentation: https://github.com/IbcAlpha/IBC/blob/master/userguide.md
#
# IMPORTANT: Set your IBKR credentials below before starting IB Gateway.

# ── IBKR Login ────────────────────────────────────────────────────────────────
# Your IBKR username and password. IBC uses these to auto-login.
IbLoginId=
IbPassword=

# Paper trading mode. Set to "yes" for paper, "no" for live.
TradingMode=paper

# ── IB Gateway Settings ──────────────────────────────────────────────────────

# Accept incoming API connections without manual confirmation.
AcceptIncomingConnectionAction=accept

# Allow connections from localhost only (secure — the trading app runs on same host).
IbAutoClosedown=no

# Dismiss various popups that would otherwise block headless operation.
DismissPasswordExpiryWarning=yes
DismissNSEComplianceNotice=yes
DismissBidAskFarApartWarning=yes

# Auto-restart IB Gateway if it exits unexpectedly.
# IBC will re-launch and re-login automatically.
ExistingSessionDetectedAction=primary

# ── API Settings ──────────────────────────────────────────────────────────────
# These match the defaults in config.py (IBKR_PORT=4002 for paper).
# IB Gateway's API port is configured in the gateway itself, not here.
# Default: 4001 (live), 4002 (paper). No change needed.

# Read-only API mode. Must be "no" to allow order submission.
ReadOnlyApi=no

# ── Logging ───────────────────────────────────────────────────────────────────
LogToConsole=yes
